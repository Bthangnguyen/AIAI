name: AIAI Travel Optimizer CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  solver-tests:
    name: Run Solver Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "fleet-route-optimizer-cvrptw/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fleet-route-optimizer-cvrptw/requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          cd fleet-route-optimizer-cvrptw
          pytest tests/ -v

  gateway-lint:
    name: Lint Gateway App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy types-requests

      - name: Run flake8
        run: |
          flake8 layer2_3_gateway/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run mypy
        run: |
          mypy layer2_3_gateway/app/ --ignore-missing-imports

  mobile-typecheck:
    name: Mobile TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "mobile layer/AITravelOptimizer/package-lock.json"

      - name: Install Dependencies
        run: |
          cd "mobile layer/AITravelOptimizer"
          npm ci --legacy-peer-deps

      - name: Verify Type Safety
        run: |
          cd "mobile layer/AITravelOptimizer"
          npm run compile
