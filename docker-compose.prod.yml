services:
  travel-db:
    container_name: travel-db
    build:
      context: ./layer2_3_gateway/db
      dockerfile: Dockerfile
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=1GB", "-c", "shared_preload_libraries=pg_cron", "-c", "cron.database_name=travel"]
    volumes:
      - travel_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=travel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=travel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d travel -U travel"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - travel-network

  routing-osrm-hue:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.0
    container_name: routing_osrm_hue
    restart: unless-stopped
    volumes:
      - ./Hue_OSRM_Data:/data:ro
    command: "osrm-routed --algorithm ch --max-table-size 100 /data/hue.osrm"
    networks:
      - travel-network

  cvrptw-solver:
    container_name: cvrptw-solver
    build:
      context: ./fleet-route-optimizer-cvrptw
      dockerfile: Dockerfile
    volumes:
      - solver_results:/app/results
      - solver_inputs:/app/inputs
      - solver_cache:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OSRM_BASE_URL=http://routing-osrm-hue:5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - routing-osrm-hue
    networks:
      - travel-network

  travel-gateway:
    container_name: travel-gateway
    build:
      context: ./layer2_3_gateway
      dockerfile: Dockerfile
    env_file:
      - ./layer2_3_gateway/travel.prod.env
    environment:
      - SQL_HOST=travel-db
      - SQL_PORT=5432
      - SQL_DB=travel
      - SQL_USER=travel
      - SQL_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - LAYER4_BASE_URL=http://cvrptw-solver:8000
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    command: bash -c "
      gunicorn app.main:app
      -w ${GATEWAY_WORKERS:-4} -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8080
      --timeout 120
      --graceful-timeout 30
      "
    ports:
      - "127.0.0.1:8001:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/v1/trip/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      travel-db:
        condition: service_healthy
      cvrptw-solver:
        condition: service_healthy
    networks:
      - travel-network

  caddy:
    image: caddy:2.8
    container_name: travel-caddy
    profiles:
      - public
    environment:
      - BACKEND_DOMAIN=${BACKEND_DOMAIN:?set BACKEND_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      travel-gateway:
        condition: service_healthy
    networks:
      - travel-network

volumes:
  travel_data:
  solver_results:
  solver_inputs:
  solver_cache:
  caddy_data:
  caddy_config:

networks:
  travel-network:
    driver: bridge
